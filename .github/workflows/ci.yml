name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
        env:
          OPENAI_API_KEY: sk-test-placeholder-for-ci-build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke (mocked API)
        run: npm run test:e2e
        env:
          CI: true
          OPENAI_API_KEY: sk-test-placeholder-for-ci-build
